# Boardly project-scoped Codex configuration.
#
# Project context:
# - Jira-like Symfony project from scratch.
# - PHP 8.2+, DDD, Hexagonal Architecture, EDA, modular monolith.
# - Relational DB is the source of truth.
# - Redis and OpenSearch/Elasticsearch are infrastructure projections/cache only.
# - Frontend uses Next.js + TypeScript with context-based hexagonal architecture per ADR-0006.
# - Frontend styling uses Tailwind CSS, CSS variables, shadcn-style project-owned primitives, and Radix per ADR-0007.
#
# Security posture:
# - Use the restrictive `boardly-safe` permission profile by default.
# - Network access is disabled by default and must be explicitly approved.
# - Sensitive files are denied by default.
# - SQL/database dump files are denied by default; Codex must request permission before reading them.
#
# Custom subagents and skills:
# - Project-specific subagents are registered explicitly in [agents.<role>] below.
# - Role-specific config layers live in .codex/agents/*.toml.
# - Role instructions are defined in .codex/agents/instructions/*.md.
# - Shared skill usage rules are defined in .codex/agents/instructions/_skill-usage.md.
# - Shared MemPalace usage rules are defined in .codex/agents/instructions/_mempalace-usage.md.
# - Reusable skills are registered explicitly in [[skills.config]] below.
# - Subagents should use skills as execution playbooks instead of duplicating workflow logic.
# - Do not assume existing Symfony files, Doctrine entities, controllers, frontend contexts, or module structure until they are explicitly created.

include_permissions_instructions = true
approvals_reviewer = "user"
approval_policy = { granular = { sandbox_approval = true, mcp_elicitations = true, rules = true, request_permissions = true, skill_approval = false } }
default_permissions = "boardly-safe"

# Suppress warnings for explicitly enabled experimental Codex features used by this project.
suppress_unstable_features_warning = true

[features]
exec_permission_approvals = true
multi_agent = true
multi_agent_v2 = true

