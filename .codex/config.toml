[permissions.boardly-safe.filesystem]
glob_scan_max_depth = 8
":minimal" = "read"

[permissions.boardly-safe.filesystem.":project_roots"]
# Allow normal project work inside the repository, then deny sensitive reads below.
"." = "write"

# Environment and local credentials.
".env*" = "none"
"**/.env*" = "none"
"auth.json" = "none"
"**/auth.json" = "none"
".npmrc" = "none"
"**/.npmrc" = "none"
".pypirc" = "none"
"**/.pypirc" = "none"

# Symfony/application/frontend secrets and private local state.
"config/secrets/**" = "none"
"var/private/**" = "none"
"var/backups/**" = "none"
"var/dumps/**" = "none"
"storage/private/**" = "none"
"storage/backups/**" = "none"
"storage/dumps/**" = "none"
"frontend/.env*" = "none"
"frontend/**/.env*" = "none"

# Database dumps, SQL exports, and local database files.
"*.sql" = "none"
"**/*.sql" = "none"
"*.sql.gz" = "none"
"**/*.sql.gz" = "none"
"*.dump" = "none"
"**/*.dump" = "none"
"*.bak" = "none"
"**/*.bak" = "none"
"*.sqlite" = "none"
"**/*.sqlite" = "none"
"*.sqlite3" = "none"
"**/*.sqlite3" = "none"
"*.db" = "none"
"**/*.db" = "none"

# Private keys, certificates, and token material.
"*.pem" = "none"
"**/*.pem" = "none"
"*.key" = "none"
"**/*.key" = "none"
"*.p12" = "none"
"**/*.p12" = "none"
"*.pfx" = "none"
"**/*.pfx" = "none"
"id_rsa" = "none"
"**/id_rsa" = "none"
"id_ed25519" = "none"
"**/id_ed25519" = "none"

[permissions.boardly-safe.network]
enabled = false

# Do not set [agents].max_threads, [agents].max_depth, or
# [agents].job_max_runtime_seconds while multi_agent_v2 is enabled.
# multi_agent_v2 accepts role registrations below, but rejects those v1 limits.

[agents.product-domain-analyst]
description = "Clarifies Boardly product behavior, actors, MVP scope, use cases, acceptance criteria, and business risks before implementation."
config_file = "agents/product-domain-analyst.toml"
nickname_candidates = ["DomainAnalyst", "ProductAnalyst"]

[agents.ddd-modeling]
description = "Models Boardly domain boundaries, aggregates, invariants, value objects, domain services, repositories, domain events, and transaction boundaries."
config_file = "agents/ddd-modeling.toml"
nickname_candidates = ["DomainModeler", "DDDReviewer"]

[agents.workflow-permissions]
description = "Designs issue workflows, statuses, transitions, guards, validators, permissions, project membership, issue visibility, and audit-sensitive access decisions."
config_file = "agents/workflow-permissions.toml"
nickname_candidates = ["WorkflowGuard", "AccessArchitect"]

[agents.symfony-architecture]
description = "Translates Boardly architecture into Symfony-friendly Domain/Application/Infrastructure/UI implementation without making Symfony the center of the design."
config_file = "agents/symfony-architecture.toml"
nickname_candidates = ["SymfonyArchitect", "FrameworkMapper"]

[agents.async-messaging]
description = "Designs RabbitMQ and Symfony Messenger flows, Outbox, retries, dead-letter behavior, idempotent consumers, and async observability."
config_file = "agents/async-messaging.toml"
nickname_candidates = ["AsyncDesigner", "QueueArchitect"]

[agents.search-read-models]
description = "Designs OpenSearch/Elasticsearch usage, searchable documents, read models, projections, reindexing, stale-index handling, and permissions-aware search."
config_file = "agents/search-read-models.toml"
nickname_candidates = ["SearchDesigner", "ReadModelArchitect"]

[agents.cache-performance]
description = "Designs Redis usage, TTL, invalidation, hot read paths, database query risks, locks, rate limiting, and performance trade-offs."
config_file = "agents/cache-performance.toml"
nickname_candidates = ["PerformanceReviewer", "CacheArchitect"]

[agents.testing-security-reviewer]
description = "Reviews Boardly features for test coverage, permission correctness, visibility rules, abuse cases, auditability, and regression risks."
config_file = "agents/testing-security-reviewer.toml"
nickname_candidates = ["SecurityReviewer", "QAArchitect"]

[agents.devops-adr-documentation]
description = "Designs operational readiness and ADR documentation: workers, health checks, logs, metrics, traces, recovery commands, and architecture trade-offs."
config_file = "agents/devops-adr-documentation.toml"
nickname_candidates = ["OpsArchitect", "ADRWriter"]

[agents.branch-architecture-reviewer]
description = "Reviews the current branch against main with architecture-first focus: DDD/Hexagonal boundaries, Symfony integration, permissions, transactions, tests, and production risks."
config_file = "agents/branch-architecture-reviewer.toml"
nickname_candidates = ["BranchReviewer", "ArchitectureReviewer", "MergeReviewer"]

[agents.frontend-context-architect]
description = "Designs Boardly Next.js frontend context-based hexagonal architecture from ADR-0006: contexts, layers, import boundaries, and frontend ownership rules."
config_file = "agents/frontend-context-architect.toml"
nickname_candidates = ["FrontendArchitect", "ContextArchitect"]

[agents.frontend-identity-access]
description = "Designs Boardly frontend IdentityAccess context: auth use cases, memory-only access token, HttpOnly refresh cookie, gateways, session bootstrap, and protected routes."
config_file = "agents/frontend-identity-access.toml"
nickname_candidates = ["FrontendAuth", "IdentityFrontend"]

[agents.frontend-ui-composition]
description = "Designs Next.js and React presentation composition: app routes, providers, pages, shared UI, context components, hooks, guards, and forms."
config_file = "agents/frontend-ui-composition.toml"
nickname_candidates = ["UIComposer", "NextComposer"]

[agents.frontend-reviewer]
description = "Reviews frontend changes against ADR-0006 with focus on context/layer boundaries, auth safety, API integration, UI composition, imports, and tests."
config_file = "agents/frontend-reviewer.toml"
nickname_candidates = ["FrontendReviewer", "ADR0006Reviewer"]

[agents.task-verifier]
description = "Verifies task completion evidence against planning, analysis, checklist, implementation, verification artifacts, diffs, and command results."
config_file = "agents/task-verifier.toml"
nickname_candidates = ["TaskVerifier", "EvidenceVerifier", "ChecklistVerifier"]

[mcp_servers.sequentialthinking]
command = "docker"
args = ["run", "--rm", "-i", "mcp/sequentialthinking"]
startup_timeout_sec = 20
tool_timeout_sec = 120
default_tools_approval_mode = "prompt"
enabled = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 60
tool_timeout_sec = 120
default_tools_approval_mode = "prompt"
enabled = true

[mcp_servers.mempalace]
enabled = true
command = "/Users/aleksandrkopyl/.local/bin/mempalace-mcp"
args = []
cwd = "/Users/aleksandrkopyl/www/boardly"
startup_timeout_sec = 60
tool_timeout_sec = 60

[mcp_servers.mempalace.tools.mempalace_search]
approval_mode = "approve"
