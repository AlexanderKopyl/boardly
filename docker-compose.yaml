services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /app
        volumes:
            - .:/app
        depends_on:
            - postgres
            - redis
            - rabbitmq
            - opensearch
        environment:
            APP_ENV: dev
        ports:
            - "8080:8080"
        command: php -S 0.0.0.0:8080 -t public

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: boardly
            POSTGRES_USER: boardly
            POSTGRES_PASSWORD: boardly
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"

    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
            - "5672:5672"
            - "15672:15672"

    opensearch:
        image: opensearchproject/opensearch:2
        environment:
            discovery.type: single-node
            plugins.security.disabled: "true"
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: boardly-dev-password-ChangeMe1!
            OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ulimits:
            memlock:
                soft: -1
                hard: -1
            nofile:
                soft: 65536
                hard: 65536
        ports:
            - "9200:9200"
        volumes:
            - opensearch_data:/usr/share/opensearch/data

volumes:
    postgres_data:
    opensearch_data:
