description = "Create a safe Boardly implementation plan"
prompt = """
Create a minimal implementation plan for a Boardly task.

Required:
1. Base the plan on current repository facts.
2. Reuse relevant existing skills from skills/.
3. Do not edit files.
4. Preserve public contracts unless the task explicitly changes them.
5. Include:
   - scope
   - assumptions
   - files likely to change
   - step-by-step plan
   - verification commands
   - risks
   - rollback notes
   - out-of-scope items
"""
